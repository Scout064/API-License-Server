name: Update Security Policy Versions Table

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  update-security-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate Supported Versions Table
        run: |
          npm install semver
          node <<'EOF'
          const fs = require('fs');
          const semver = require('semver');

          async function updateSecurityPolicy() {
            const repo = process.env.GITHUB_REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            
            // 1. Fetch releases from GitHub API
            const response = await fetch(`https://api.github.com/repos/${repo}/releases`, {
              headers: { Authorization: `token ${token}` }
            });
            const releases = await response.json();

            if (!Array.isArray(releases) || !releases.length) {
              console.log("No releases found.");
              process.exit(0);
            }

            // 2. Pass 1: Find the absolute latest STABLE version for every Major.Minor branch
            const latestStablePerMinor = {};
            
            releases.forEach(rel => {
              const version = rel.tag_name.replace(/^v/, '');
              
              // Rule: Only non-prereleases that are valid SemVer can be 'Supported'
              if (semver.valid(version) && !rel.prerelease) {
                const key = `${semver.major(version)}.${semver.minor(version)}`;
                if (!latestStablePerMinor[key] || semver.gt(version, latestStablePerMinor[key])) {
                  latestStablePerMinor[key] = version;
                }
              }
            });

            // 3. Pass 2: Build the table rows based on your rules
            const tableRows = releases.map(rel => {
              const version = rel.tag_name.replace(/^v/, '');
              let status = '❌'; // Default everything to unsupported

              // A version is ONLY supported (✅) if:
              // - It is valid SemVer
              // - It is NOT marked as a pre-release on GitHub
              // - It is the latest version in its minor branch (e.g., 2.1.5 vs 2.1.4)
              if (semver.valid(version) && !rel.prerelease) {
                const key = `${semver.major(version)}.${semver.minor(version)}`;
                if (latestStablePerMinor[key] === version) {
                  status = '✅';
                }
              }
              
              return `| ${rel.tag_name} | ${status} |`;
            }).join('\n');

            // 4. Update the SECURITY.md file
            const filePath = 'SECURITY.md';
            const content = fs.readFileSync(filePath, 'utf8');
            const placeholder = '';

            // This Regex ensures we replace the old table while keeping the header
            const tableHeader = `\n| Version | Supported |\n| ------- | --------- |`;
            const newContent = content.replace(
              new RegExp(`${placeholder}[\\s\\S]*`),
              `${placeholder}${tableHeader}\n${tableRows}`
            );

            fs.writeFileSync(filePath, newContent, 'utf8');
            console.log("Successfully updated SECURITY.md");
          }

          updateSecurityPolicy();
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SECURITY.md
          git commit -m "Update supported versions table" || echo "No changes"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
