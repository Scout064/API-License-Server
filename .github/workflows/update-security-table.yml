name: Update Security Policy Versions Table

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  update-security-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate Supported Versions Table
        run: |
          npm install semver
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const semver = require('semver');

          // Get all tags (exclude beta)
          const rawTags = execSync('git tag').toString().split('\n').filter(t => t && !t.includes('beta'));
          const tags = rawTags.map(t => t.replace(/^v/, '')).sort(semver.rcompare);

          if (!tags.length) {
            console.log("No tags found. Table will be empty.");
            process.exit(0);
          }

          // Determine latest patch per minor
          const latestPatch = {};
          tags.forEach(tag => {
            const key = `${semver.major(tag)}.${semver.minor(tag)}`;
            if (!latestPatch[key] || semver.gt(tag, latestPatch[key])) {
              latestPatch[key] = tag;
            }
          });

          // Build markdown table
          const table = tags.map(tag => {
            const key = `${semver.major(tag)}.${semver.minor(tag)}`;
            const supported = latestPatch[key] === tag ? '✅' : '❌';
            return `| ${tag} | ${supported} |`;
          }).join('\n');

          // Update SECURITY.md
          const filePath = 'SECURITY.md';
          let content = fs.readFileSync(filePath, 'utf8');

          // Replace the placeholder including any existing lines after it
          content = content.replace(/<!-- AUTO-GENERATED: Supported Versions Table -->[\s\S]*/, 
            `<!-- AUTO-GENERATED: Supported Versions Table -->\n${table}`);

          fs.writeFileSync(filePath, content, 'utf8');
          console.log("SECURITY.md updated with table:");
          console.log(table);
          EOF

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SECURITY.md
          git commit -m "Update supported versions table" || echo "No changes"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
