name: Update Security Policy Versions Table

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  update-security-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate Supported Versions Table
        run: |
          npm install semver
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const semver = require('semver');

          // 1. Get ALL tags (now including beta/pre-releases)
          const rawTags = execSync('git tag').toString().split('\n').filter(t => t.trim() !== '');
          
          // Sort tags using semver (handles 1.0.0-beta.1 correctly)
          const tags = rawTags.map(t => t.replace(/^v/, '')).sort(semver.rcompare);

          if (!tags.length) {
            console.log("No tags found.");
            process.exit(0);
          }

          // 2. Determine latest STABLE patch per minor
          // We only consider non-prerelease versions for the "Supported" check
          const latestStablePatch = {};
          tags.forEach(tag => {
            const isPrerelease = semver.prerelease(tag);
            if (!isPrerelease) {
              const key = `${semver.major(tag)}.${semver.minor(tag)}`;
              if (!latestStablePatch[key] || semver.gt(tag, latestStablePatch[key])) {
                latestStablePatch[key] = tag;
              }
            }
          });

          // 3. Build markdown table
          const tableRows = tags.map(tag => {
            const isPrerelease = semver.prerelease(tag);
            const key = `${semver.major(tag)}.${semver.minor(tag)}`;
            
            // Logic: Supported if it's the latest stable patch for that minor version
            const isSupported = !isPrerelease && latestStablePatch[key] === tag;
            const status = isSupported ? '✅' : '❌';
            
            return `| ${tag} | ${status} |`;
          }).join('\n');

          // 4. Update SECURITY.md
          const filePath = 'SECURITY.md';
          let content = fs.readFileSync(filePath, 'utf8');

          const placeholder = '';
          const regex = new RegExp(`${placeholder}[\\s\\S]*`);
          
          content = content.replace(regex, `${placeholder}\n${tableRows}`);

          fs.writeFileSync(filePath, content, 'utf8');
          console.log("SECURITY.md updated.");
          EOF

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SECURITY.md
          git commit -m "Update supported versions table" || echo "No changes"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
